<html>
    <head>
        <title>API Project</title>
         <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
        <link rel="stylesheet" href="Page.css">
        <script defer src="Page.js"></script>
    </head>
    <style>
        #map{
            height: 400px;
        }
    </style>
    <body>
        <header id = "header">
            <h1 id = "title">Pet Finder</h1>
            <ul id = "options">
                <li><a href="Home.html">Home</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="Help.html">Help</a></li>
            </ul>
        </header>

        <nav id = "homain">
            <div id = "top">
                <button type="button1" onclick="window.location.href='Lost.html'">Report Lost</button>
                <button type="button2" onclick="window.location.href='Found.html'">Report Found</button>
            </div>
            <div id = "left">
                <div id = "filter">
                    <h3>Filters</h3>
                    <label>Type:</label>
                    <select id = "typeFilter"> 
                        <option value = "all">Cats and Dogs</option>
                        <option value = "dog">Dog</option>
                        <option value = "cat">Cat</option>
                    </select>
                    <label>Status:</label>
                    <select id = "statusFilter"> 
                        <option value = "Both">Lost and Found</option>
                        <option value = "lost">Lost</option>
                        <option value = "found">Found</option>
                    </select>
                    <label>Color:</label>
                    <select id="colorFilter">
                        <option value="all">All Colors</option>
                        <option value="black">Black</option>
                        <option value="brown">Brown</option>
                        <option value="white">White</option>
                        <option value="gray">Gray</option>
                        <option value="golden">Golden</option>
                    </select>
                    <label>Breed:</label>
                    <input type="text" id="breedFilter" placeholder="e.g. Labrador, Siamese">
                    <label>Location:</label>
                    <input type="text" id="locationFilter" placeholder="City or area">
                    <label>Posted:</label>
                    <select id="timeFilter">
                        <option value="all">Any Time</option>
                        <option value="24h">Last 24 hours</option>
                        <option value="7d">Last 7 days</option>
                        <option value="30d">Last 30 days</option>
                    </select>
                </div>
            </div>
            <div id = "right">
                <div id="map"></div>
            </div>
           
        </nav>

        
    </body>
</html>
